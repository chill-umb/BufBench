database:
  host: localhost
  port: 5432
  name: bgbenchdb
  user: bgbench
  password: bgbench123
workload:
  type: chbenchmark
  scale: 10
  clients: 4
  threads: 2
  duration: 600
  chbenchmark:
    analytical_threads: 2
postgresql:
  shared_buffers: 500MB
  checkpoint_timeout: 5min
  checkpoint_completion_target: 0.9
  autovacuum: on
monitor:
  interval: 1
output:
  results_dir: results/
