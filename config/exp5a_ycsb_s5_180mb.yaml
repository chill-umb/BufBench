database:
  host: localhost
  port: 5432
  name: bgbenchdb
  user: bgbench
  password: bgbench123
workload:
  type: ycsb
  scale: 5
  clients: 8
  threads: 4
  duration: 600
  ycsb:
    mix:
      read: 50
      update: 30
      insert: 10
      scan: 5
      rmw: 5
      delete: 0
postgresql:
  shared_buffers: 180MB
  checkpoint_timeout: 5min
  checkpoint_completion_target: 0.9
  autovacuum: on
monitor:
  interval: 1
output:
  results_dir: results/
